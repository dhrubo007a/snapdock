# SnapDock — docker-compose for local deployment
# Usage: docker compose up -d --build

services:

  # --------------------------------------------------------------------------
  # PostgreSQL database
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - snapdock-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  # --------------------------------------------------------------------------
  # PostgreSQL backup (daily pg_dump, retains 7 days)
  # --------------------------------------------------------------------------
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - snapdock-pgbackups:/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Waiting 60s before first backup...';
        sleep 60;
        while true; do
          FNAME=/backups/snapdock_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB | gzip > $$FNAME;
          echo "Backup written: $$FNAME";
          find /backups -name '*.sql.gz' -mtime +7 -delete;
          sleep 86400;
        done
      "
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m

  # --------------------------------------------------------------------------
  # SnapDock daemon (FastAPI backend)
  # --------------------------------------------------------------------------
  snapdock:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8050:8000"
    volumes:
      # Docker socket — required for container ops
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persistent snapshot archives
      - snapdock-snapshots:/var/lib/snapdock/snapshots
      # Docker Desktop (WSL2) exposes Windows host drives here.
      # Gives the daemon read-only access to host files (compose files, .env)
      # without needing a sidecar container.  Safe to remove on Linux hosts.
      - /run/desktop/mnt/host:/run/desktop/mnt/host:ro
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  # --------------------------------------------------------------------------
  # SnapDock UI (React / Nginx)
  # --------------------------------------------------------------------------
  snapdock-ui:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8051:80"
      - "8443:443"
    depends_on:
      - snapdock
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

volumes:
  snapdock-pgdata:
  snapdock-snapshots:
  snapdock-pgbackups:

