# Production nginx config — HTTP only.
# TLS is terminated by Cloudflare Tunnel before traffic reaches this container.
# Cloudflare sets X-Forwarded-Proto: https, which is forwarded to the backend.
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 0;

    # Proxy API calls to the daemon
    location /api/ {
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://snapdock:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Forward Cloudflare's header so the backend sees the correct scheme
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # WebSocket proxy
    location /events {
        proxy_pass http://snapdock:8000/events;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
